# No secrets in this file. SUPER_CLIENT and SUPER_CONTACT are set via
# `wrangler secret put` — see README.md.
name = "hd2-strategist"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[[kv_namespaces]]
binding = "WAR_CACHE"
# Replace with the id printed by: wrangler kv namespace create WAR_CACHE
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Background sampling schedule. Cloudflare cron always evaluates in UTC —
# irrelevant for a fixed-interval poll, but any future time-of-day schedule
# must account for it.
#
# Every 10 minutes, bound by the KV free-tier write budget (~1,000
# writes/day): each run performs the request path's single merged
# sample-store write PLUS up to three raw: cache refreshes (the 45s response
# cache is always expired between ticks), so a run costs ~4 KV writes.
# At */10 that is 144 runs × 4 ≈ 576 writes/day — comfortably under the
# ceiling with headroom for user traffic. A 2-min cadence would be ~2,880/day
# (≈3× over budget; KV writes then fail silently and the sampler stalls for
# the rest of the UTC day), and faster sampling also SHORTENS the visible
# history window: the 96-point ring buffer spans 16h at */10 but only ~3h at
# */2. If this cadence is ever tightened, re-check the full KV write budget
# first — see README "Background sampling".
[triggers]
crons = ["*/10 * * * *"]
